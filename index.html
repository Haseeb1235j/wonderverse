        <!-- Top header bar containing Search bar -->

          <div class="search-wrapper" style="display: flex; gap: 10px; width: 420px; max-width: 100%;">
            <div style="position: relative; flex: 1;">
              <svg class="search-icon" viewBox="0 0 24 24" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: var(--text-secondary); pointer-events: none;">

            </div>
            <button id="global-search-btn" class="btn-glowing" style="padding: 10px 20px; font-size: 13px; border-radius: 30px; flex-shrink: 0; height: 44px; display: inline-flex; align-items: center; justify-content: center;">Scan</button>
          </div>
          <div style="font-size: 13px; font-weight: 700; color: var(--accent-cyan);" id="header-streak-badge">
            🔥 STREAK: 0 DAYS
          </div>
        </header>

        <!-- Dynamic Page View Slot -->
        <div id="app">
          <!-- Fallback layout visible if JavaScript is loading or blocked -->
          <div style="padding: 40px; text-align: center; margin-top: 50px;" class="glass-card">
            <h1 style="font-size: 32px; color: #fff; margin-bottom: 20px;">WonderVerse</h1>
            <p style="color: #9fa6b2; font-size: 16px; margin-bottom: 30px; max-width: 500px; margin-left: auto; margin-right: auto;">
              Initializing the global search visual engine...
            </p>
            <a href="#/explore" class="btn-glowing" style="display:inline-flex; align-items:center; justify-content:center;">
